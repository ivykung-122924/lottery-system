<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理後台</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f5; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #d63384; }
        .box { background:#fff0f5; padding:20px; border-radius:10px; margin-bottom:20px; text-align: left; }
        button { background: #d63384; color: white; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; margin-right: 5px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: #ffdae9; color: #d63384; }
        #adminArea { display: none; }
    </style>
</head>
<body>
    <div id="loginArea" class="container">
        <h2>管理者登入</h2>
        <input type="password" id="pw" placeholder="管理密碼" style="padding:10px;">
        <button onclick="login()">登入</button>
    </div>

    <div id="adminArea" class="container">
        <h2>⚙️ 資料管理中心</h2>
        <div class="box">
            <b>標題須含：</b> 姓名、手機、訂單編號、金額、抽獎次數
            <br><input type="file" id="file" accept=".xlsx, .csv" style="margin: 15px 0;">
            <div>
                <button id="btnR" onclick="upload('replace')">⚠️ 刪除今日舊資料並匯入</button>
                <button id="btnA" onclick="upload('append')" style="background:#6c757d;">➕ 直接追加資料</button>
            </div>
        </div>
        <div style="text-align: left;">
            <h3>📊 資料清單預覽</h3>
            <table>
                <thead><tr><th>姓名</th><th>手機</th><th>訂單</th><th>金額</th><th>次數</th><th>日期</th></tr></thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let p = "";
        function login() {
            if(document.getElementById('pw').value === "123456") {
                p = "123456";
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
                fetchList();
            } else { alert("密碼錯誤"); }
        }

        async function fetchList() {
            try {
                const res = await fetch('/api/admin/list', { headers: { 'x-admin-password': p } });
                const data = await res.json();
                document.getElementById('listBody').innerHTML = data.map(i => `
                    <tr><td>${i.name}</td><td>${i.phone}</td><td>${i.orderId}</td><td>${i.amount}</td><td>${i.count}</td><td>${i.importDate}</td></tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function upload(mode) {
            const f = document.getElementById('file').files[0];
            if(!f) return alert("請選擇檔案");
            const btn = event.target;
            const originalText = btn.innerText;
            
            btn.innerText = "處理中...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append('file', f);

            try {
                const res = await fetch(`/api/admin/import-replace-date?mode=${mode}`, {
                    method: 'POST',
                    headers: { 'x-admin-password': p },
                    body: fd
                });
                const result = await res.json();
                alert(result.ok ? `成功匯入 ${result.inserted} 筆` : "失敗：" + result.error);
                fetchList();
            } catch(e) {
                alert("連線錯誤");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
