<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理後台</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f5; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #d63384; }
        .btn-group { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
        button { background: #d63384; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
        .btn-append { background-color: #6c757d; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        #adminArea { display: none; }
    </style>
</head>
<body>
    <div class="container" id="loginArea">
        <h2>管理者登入</h2>
        <input type="password" id="pw" placeholder="請輸入密碼">
        <button onclick="login()">登入</button>
    </div>

    <div class="container" id="adminArea">
        <h2>⚙️ 資料管理中心</h2>
        <input type="file" id="file" accept=".xlsx, .csv">
        <div class="btn-group">
            <button onclick="upload('replace')">⚠️ 刪除今日舊資料並匯入</button>
            <button onclick="upload('append')" class="btn-append">➕ 直接追加資料</button>
        </div>
        <div id="dataList">
            <h3>最新 50 筆資料預覽</h3>
            <table>
                <thead><tr><th>姓名</th><th>手機</th><th>次數</th><th>日期</th></tr></thead>
                <tbody id="userBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let p = "";
        function login() {
            const val = document.getElementById('pw').value;
            if(val === "123456") {
                p = val;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
                fetchData();
            } else { alert("密碼錯誤"); }
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/admin/list', { headers: { 'x-admin-password': p } });
                const users = await res.json();
                document.getElementById('userBody').innerHTML = users.map(u => `
                    <tr><td>${u.name}</td><td>${u.phone}</td><td>${u.count}</td><td>${u.importDate}</td></tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function upload(mode) {
            const f = document.getElementById('file').files[0];
            if(!f) return alert("請選擇檔案");
            const fd = new FormData();
            fd.append('file', f);
            try {
                const res = await fetch(`/api/admin/import-replace-date?mode=${mode}`, {
                    method: 'POST',
                    headers: { 'x-admin-password': p },
                    body: fd
                });
                const result = await res.json();
                if(result.ok) {
                    alert(`成功！已${mode === 'replace' ? '替換' : '追加'} ${result.inserted} 筆資料`);
                    fetchData();
                } else { alert("錯誤：" + result.error); }
            } catch(e) { alert("上傳失敗，請檢查網路"); }
        }
    </script>
</body>
</html>
