<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理後台</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f5; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #d63384; }
        .box { background:#fff0f5; padding:20px; border-radius:10px; margin-top:20px; }
        button { background: #d63384; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        #adminArea { display: none; }
    </style>
</head>
<body>
    <div class="container" id="loginArea">
        <h2>管理者登入</h2>
        <input type="password" id="pw" style="width:100%; padding:10px; box-sizing:border-box;" placeholder="管理密碼">
        <button onclick="login()">登入</button>
    </div>
    <div class="container" id="adminArea">
        <h2>⚙️ 資料管理中心</h2>
        <div class="box">
            <p style="font-size:14px; text-align:left;">Excel 標題須包含：<br><b>姓名、手機、訂單編號、金額、抽獎次數</b></p>
            <input type="file" id="file" accept=".xlsx, .csv">
            <button onclick="upload('replace')">⚠️ 刪除今日舊資料並匯入</button>
            <button onclick="upload('append')" style="background:#6c757d;">➕ 直接追加資料</button>
        </div>
    </div>
    <script>
        let p = "";
        function login() {
            const val = document.getElementById('pw').value;
            if(val === "123456") {
                p = val;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
            } else { alert("密碼錯誤"); }
        }
        async function upload(mode) {
            const f = document.getElementById('file').files[0];
            if(!f) return alert("請選擇檔案");
            const fd = new FormData();
            fd.append('file', f);
            const res = await fetch(`/api/admin/import-replace-date?mode=${mode}`, {
                method: 'POST',
                headers: { 'x-admin-password': p },
                body: fd
            });
            const result = await res.json();
            alert(result.ok ? `成功匯入 ${result.inserted} 筆` : "失敗：" + result.error);
        }
    </script>
</body>
</html>
