<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽獎系統後台</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #d63384; border-left: 5px solid #d63384; padding-left: 10px; }
        .login-box { text-align: center; padding: 50px 0; }
        .admin-content { display: none; }
        input[type="password"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ffdae9; border-radius: 8px; box-sizing: border-box; }
        button { background: #d63384; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        .history { margin-top: 30px; font-size: 13px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container" id="loginArea">
    <div class="login-box">
        <h2>管理者登入</h2>
        <input type="password" id="pwInput" placeholder="請輸入管理密碼">
        <button onclick="checkLogin()">確認登入</button>
    </div>
</div>

<div class="container admin-content" id="adminArea">
    <h2>資料匯入管理</h2>
    <p>選擇 Excel (.xlsx) 或 CSV 檔案上傳：</p>
    <input type="file" id="fileInput" accept=".xlsx, .csv">
    <button onclick="upload('append')">直接追加資料</button>
    <button onclick="upload('replace')" style="background:#6c757d; margin-top:10px;">刪除同日期舊資料並匯入</button>
    
    <div class="history">
        <h3>最近匯入紀錄</h3>
        <table id="historyTable">
            <thead><tr><th>時間</th><th>檔案</th><th>筆數</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let pass = "";
    function checkLogin() {
        const input = document.getElementById('pwInput').value;
        if(input === "123456") {
            pass = input;
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            loadHistory();
        } else { alert("密碼錯誤"); }
    }

    async function upload(mode) {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("請選擇檔案");
        const formData = new FormData();
        formData.append('file', file);
        const url = mode === 'append' ? '/api/admin/import-append' : '/api/admin/import-replace-date';
        
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'x-admin-password': pass },
            body: formData
        });
        const result = await res.json();
        if(result.ok) { alert("成功匯入 " + result.inserted + " 筆！"); loadHistory(); }
        else { alert("失敗：" + result.error); }
    }

    async function loadHistory() {
        const res = await fetch('/api/admin/import-history', { headers: { 'x-admin-password': pass } });
        const data = await res.json();
        document.getElementById('historyTable').querySelector('tbody').innerHTML = data.map(h => `
            <tr><td>${h.uploadedAt}</td><td>${h.originalName}</td><td>${h.rowsInserted}</td></tr>
        `).join('');
    }
</script>
</body>
</html>
