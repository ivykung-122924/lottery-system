<div class="container" id="adminArea">
    <h2>⚙️ 資料管理中心</h2>
    <div style="background:#fff0f5; padding:20px; border-radius:10px;">
        <p>請上傳包含以下標題的 Excel：<br><b>姓名、手機、訂單編號、金額、抽獎次數</b></p>
        <input type="file" id="file" accept=".xlsx, .csv">
        <div style="margin-top:20px;">
            <button onclick="upload('replace')">⚠️ 刪除今日舊資料並匯入</button>
            <button onclick="upload('append')" style="background:#6c757d;">➕ 直接追加資料</button>
        </div>
    </div>
    <!-- 這裡移除了原本的 table 預覽區 -->
</div>
