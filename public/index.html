<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽獎次數查詢</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fdf2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #d63384; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #ffdae9; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; margin-bottom: 20px; }
        button { width: 100%; background: #d63384; color: white; border: none; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b02a6b; }
        #result { margin-top: 25px; text-align: left; display: none; }
        .result-item { background: #fff0f5; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #d63384; }
        .latest-info { margin-top: 30px; font-size: 13px; color: #999; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 抽獎資格查詢</h1>
        <input type="text" id="phone" placeholder="輸入手機號碼 (例: 0912...)" maxlength="10">
        <button onclick="check()">立即查詢</button>
        
        <div id="result"></div>

        <!-- 顯示最新日期的地方 -->
        <div class="latest-info" id="latestDateText">載入最新結算日期中...</div>
    </div>

    <script>
        // 頁面加載時自動獲取最新日期
        window.onload = async () => {
            try {
                const res = await fetch('/api/latest-date');
                const data = await res.json();
                document.getElementById('latestDateText').innerText = `最新結算訂單日期為：${data.latestDate}`;
            } catch (e) {
                document.getElementById('latestDateText').innerText = "";
            }
        };

        async function check() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) return alert("請輸入手機號碼");
            
            const res = await fetch(`/api/check?phone=${phone}`);
            const data = await res.json();
            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';

            if (data.found) {
                let html = `<div style="text-align:center; margin-bottom:15px;"><b>${data.name}</b> 您好，總共 <b>${data.totalCount}</b> 次機會</div>`;
                data.details.forEach(item => {
                    html += `
                        <div class="result-item">
                            <small>${item.importDate}</small><br>
                            訂單：${item.orderId}<br>
                            金額：$${item.amount} / 抽獎數：${item.count}
                        </div>`;
                });
                resDiv.innerHTML = html;
            } else {
                resDiv.innerHTML = '<div style="text-align:center; color:#999;">查無資料，請確認號碼是否正確</div>';
            }
        }
    </script>
</body>
</html>
