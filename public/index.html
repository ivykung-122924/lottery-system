<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽獎機會查詢</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff5f8; text-align: center; padding: 20px; color: #444; }
        .box { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); }
        h1 { color: #d63384; font-size: 24px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ffdae9; border-radius: 12px; box-sizing: border-box; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: #d63384; }
        button { width: 100%; padding: 15px; background: #d63384; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        #res { margin-top: 25px; padding: 20px; border-radius: 16px; display: none; background: #fffafc; border: 1px solid #ffdae9; line-height: 1.6; }
        .error-msg { color: #ff4d4f; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎁 抽獎機會查詢</h1>
        <p style="font-size: 14px; color: #888;">輸入手機號碼查看您的抽獎次數</p>
        <input type="tel" id="p" placeholder="例如：0912345678" maxlength="10">
        <button id="btn" onclick="s()">立即查詢</button>
        <div id="res"></div>
    </div>

    <script>
        async function s() {
            const v = document.getElementById('p').value.trim();
            const resDiv = document.getElementById('res');
            const btn = document.getElementById('btn');

            if(!v) return alert("請輸入手機號碼");

            // 顯示查詢狀態
            resDiv.style.display = 'block';
            resDiv.innerHTML = '<span style="color:#d63384">🔍 查詢中，請稍候...</span>';
            btn.disabled = true;

            try {
                // 使用絕對路徑確保 API 呼叫正確
                const response = await fetch('/api/check?phone=' + encodeURIComponent(v));
                
                if (!response.ok) {
                    throw new Error(`伺服器回應錯誤 (${response.status})`);
                }

                const d = await response.json();

                if(d.found) {
                    resDiv.innerHTML = `
                        <div style="font-size: 18px; font-weight: bold; color: #d63384; margin-bottom: 8px;">
                            ${d.name} 您好
                        </div>
                        <div style="font-size: 16px;">
                            您目前累積共有<br>
                            <span style="font-size: 32px; color: #d63384; font-weight: 900;">${d.count}</span> 次抽獎機會！
                        </div>
                    `;
                } else {
                    resDiv.innerHTML = `
                        <div style="color: #888;">
                            查無資料<br>
                            <span style="font-size: 13px;">請確認號碼是否正確，或聯繫管理員。</span>
                        </div>
                    `;
                }
            } catch(e) {
                console.error('查詢出錯:', e);
                resDiv.innerHTML = `
                    <div class="error-msg">
                        ❌ 查詢失敗<br>
                        <small>${e.message}</small><br>
                        <button onclick="location.reload()" style="padding:5px 10px; font-size:12px; width:auto; margin-top:10px;">重新整理</button>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }

        // 支援按 Enter 鍵查詢
        document.getElementById('p').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') s();
        });
    </script>
</body>
</html>
