<!-- 關鍵修改：在 <script> 的 s() 函數內 -->
<script>
async function s() {
    // ... 前段省略 ...
    const d = await response.json();
    if(d.found) {
        let tableHtml = `
            <h3 style="color:#d63384">${d.name} 您好</h3>
            <p>累積總抽獎次數：<b style="font-size:24px; color:#d63384">${d.totalCount}</b> 次</p>
            <hr border="0" style="border-top:1px solid #ffdae9">
            <p style="font-size:14px; color:#888;">抽獎資格明細：</p>
            <table style="width:100%; font-size:12px; border-collapse:collapse; margin-top:10px;">
                <tr style="background:#fff0f5; color:#d63384">
                    <th style="padding:5px; border:1px solid #eee">訂單編號</th>
                    <th style="padding:5px; border:1px solid #eee">金額</th>
                    <th style="padding:5px; border:1px solid #eee">日期</th>
                    <th style="padding:5px; border:1px solid #eee">次數</th>
                </tr>`;
        
        d.details.forEach(item => {
            tableHtml += `
                <tr>
                    <td style="padding:5px; border:1px solid #eee">${item.orderId}</td>
                    <td style="padding:5px; border:1px solid #eee">${item.amount}</td>
                    <td style="padding:5px; border:1px solid #eee">${item.importDate}</td>
                    <td style="padding:5px; border:1px solid #eee">${item.count}</td>
                </tr>`;
        });
        tableHtml += `</table>`;
        resDiv.innerHTML = tableHtml;
    } else {
        resDiv.innerHTML = '查無資料，請確認號碼是否正確。';
    }
}
</script>
